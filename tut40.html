<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation.</title>
</head>
<style>
    .container {
        background-color: rgb(195, 245, 195);
        width: 40vw;
        height: 80vh;
    }

    .box{
        width: 35px;
        height: 45px;
        border: 2px solid black;
       
        /* animation-iteration-count: infinite; */
        /* animation-name: shivamkaAnimation; */
        /* animation-duration: 3s; */
        /* animation-timing-function: cubic-bezier(0, 0, 0, 0.96); */
        /* animation-delay: 3s; */
        /* animation-direction: alternate; */
        /* animation-direction: alternate-reverse; */
        /* animation-direction:reverse;  */
        /* animation: name duration timing-function delay iteration-count direction fill-mode; */
         animation: shivamkaAnimation 2s ease-in-out 2s 1, shivam2 3s ease-in-out 2s 1 ;
    } 

    @keyframes shivamkaAnimation {
        from {
            background-color: #ff0000;

        }

        to {
            transform: translatex(1000px);
            background-color: yellow;
        }
    }

    @keyframes shivam2 {
        0% {
            transform: rotate(100deg);
        }

        20% {
            transform: rotate(200deg);
        }

        50% {
            transform: rotate(220deg);

        }

        80% {
            transform: rotate(300deg);
        }

        100% {
            transform: rotate(310deg);
        } 
    }
    
</style>

<body>
    <div class="container">
        <div class="box"> Box</div>
    </div>
</body>

</html>
