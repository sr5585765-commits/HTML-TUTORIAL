<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS display property</title>
</head>
<style>
    *{
       margin-left: 65px;
    }
    
    .box {
        border: 2px solid rgb(94, 35, 232);
        display: inline-block;
        margin-top: 34px;
        width: 150px;
        height: 60px;
        padding-left: 25px;
        padding-top: 25px;
        display:inline-flex;
        justify-content: center;
       
    }

    .box2 {
        border: 2px solid blue;
        display: inline-block;
        margin-top: 34px;
        width: 150px;
        height: 60px;
        padding-left: 25px;
        padding-top: 25px;
    }

    .box3 {
        border: 2px solid blue;
        display: inline-block;
        margin-top: 34px;
        width: 220px;
        height: 60px;
        padding-left: 25px;
        padding-top: 25px;
    }
</style>

<body>
    <div class="box">
        I am good boy.
    </div>
        <span class="box2"> I am good person.</span> 
        <label class="box3">Hello my name is shivam roy</label>
</body>

</html>
