<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object-fit and Object-cover</title>
</head>
<style>
    .container {
        height: 488px;
        width: 466px;
        background-color: rgb(216, 213, 213);
        border: 2px solid black;
        background-image: url(https://plus.unsplash.com/premium_photo-1669122601959-2930ed87010d?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
        background-position: center center;
        /* background-repeat: repeat-x; */
        background-clip: border-box;
    }
    img{
        height: 488px;
        width: 466px; 
        object-fit: cover;
        object-position:50% 50% ;
        /* object-position: top right; */
        /* object-fit: scale-down; */
        /* object-fit: none; */
        /* object-position: bottom right; */
        /* object-fit: fill; */
        /* object-fit: contain; */
    }
</style>

<body>
    <div class="container">
        <img src="https://plus.unsplash.com/premium_photo-1669122601959-2930ed87010d?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" >

    </div>

</body>

</html>
