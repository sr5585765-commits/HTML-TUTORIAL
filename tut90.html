<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone , Paper , scissors</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        text-align: center;
    }

    h1 {
        background-color: #081b31;
        color: #fff;
        height: 5rem;
        line-height: 5rem;
    }

    .choice {
        height: 165px;
        width: 165px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;

    }

    .choice:hover {
        cursor: pointer;
        background-color: #081b31;
    }

    img {
        height: 150px;
        width: 150px;
        object-fit: cover;
        border-radius: 50%;
    }

    .choices {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 3rem;
        margin-top: 5rem;
    }

    .score-board {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2rem;
        margin-top: 3rem;
        gap: 5rem;
    }

    #user-score,
    #comp-score {
        font-size: 4rem;
    }

    .msg-container {
        margin-top: 5rem;
    }

    #msg {
        background-color: #081b31;
        color: #fff;
        font-size: 2rem;
        display: inline;
        padding: 1rem;
        border-radius: 1rem;
    }
</style>

<body>
    <h1>Rock Paper Scissor Game</h1>
    <div class="choices">
        <div class="choice" id="rock">
            <img src="https://images.unsplash.com/photo-1605981499869-907b2e117ded?q=80&w=1936&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="">
        </div>
        <div class="choice" id="paper">
            <img
                src="https://images.unsplash.com/photo-1559558571-3ce27e4a2d9c?q=80&w=1986&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
        </div>
        <div class="choice" id="scissor">
           <img src="https://images.unsplash.com/photo-1570191772772-100f4c6ebeac?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" >
            <!-- https://images.unsplash.com/photo-1730522262151-cfa048147a10?q=80&w=735&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D -->
            <!-- <img
                src="https://images.unsplash.com/photo-1502159212845-f31a19546a5d?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"> -->
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>you</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>
    <script>
        let userScore = 0;
        let compScore = 0;
        const choices = document.querySelectorAll(".choice");
        const userScorePara = document.querySelector("#user-score")
         const compScorePara = document.querySelector("#comp-score")
         document.body.style.backgroundColor = " #ffffc7"

        const genCompChoice = () => {
            const options = ["rock", "paper", "scissor"]
            const randIdx = Math.floor(Math.random() * 3);
            return options[randIdx];
        }
        const drawGame = () => {
            msg.innerText = "game was draw.play again"
            msg.style.backgroundColor = "#081b31";
        };

        const showWinner = (userWin,userChoice,compChoice) => {
            if (userWin) {
                userScore++;
                userScorePara.innerText = userScore;
                msg.innerText = `you win! your ${userChoice} beats ${compChoice}`;
                msg.style.backgroundColor = "green";
            } else {
                msg.innerText =`you lost!  ${compChoice} beats your ${userChoice}`;
                msg. style.backgroundColor = "red";
                  compScore++;
                compScorePara.innerText = compScore;

            }
        };
        const playGame = (userChoice) => {
            console.log("user Choice", userChoice);
            //Generate computer choice : modular function
            const compChoice = genCompChoice();
            console.log("compChoice = ", compChoice)

            if (userChoice === compChoice) {
                //Draw Game
                drawGame();
            } else {
                let userWin = true;
                if (userChoice === "rock") {
                    //scissors , paper
                    userWin = compChoice === "paper" ? false : true;
                } else if (userChoice === "paper") {
                    //Rock ,scissor
                    userWin = compChoice === "scissor" ? false : true;
                } else {
                    //rock , paper
                    userWin = compChoice === "rock" ? false : true;
                }
                showWinner(userWin, userChoice,compChoice);
            };
        };

        choices.forEach((choice) => {
            console.log(choice);
            choice.addEventListener("click", () => {
                let userChoice = choice.getAttribute("id")
                playGame(userChoice);
            });

        });
    </script>
</body>

</html>
