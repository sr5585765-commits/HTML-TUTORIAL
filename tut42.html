<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Fliter.</title>
</head>
<style>
    .img1{
        filter: blur(2px);
        filter: brightness(200%) contrast(100%);
    }
    .img2{
        filter: brightness(100%) ;
        filter: blur(5);
        /* opacity: 0.4; */
        /* filter: saturate(3); */
    }
    .img3{
        filter: grayscale(100%)!important;
        filter: sepia(100%);
    }
</style>
<body>
    <div class="container">
        <img class="img1" src="https://images.unsplash.com/photo-1635530071121-ac2a767e0fc5?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" height="440px">
        <img class="img2" src="https://d3mbwbgtcl4x70.cloudfront.net/shahrukh_khan_house_361ecd082f.webp" height="440px">
        <img class="img3" src="https://c.ndtvimg.com/2024-09/n02nbh98_akshay_625x300_20_September_24.jpeg?downsize=545:307" height="400px">

    </div>
</body>
</html>
