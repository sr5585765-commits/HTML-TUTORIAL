<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS design card </title>
</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
    }
    body{
        background-color: black;
    }
    
    
    .container{
        border: 3px solid black;
        height: 98vh;
        /* height: 200vh; */
        width: 50vw;
        /* width: 200vw; */
        background-color: #f2efef;
       margin-left: 300px;
       margin-top: 30px;    
       position: sticky;
    }
    .box1{
        width:50vw ;
        height: 10vh;
        border: 1px solid black;
        /* margin-top: 4px; */
        margin: 3px auto;
        background-color: hotpink;
        /* margin-left:2px ; */
        /* margin-right: 7px; */
    }
    .box2{
        width: 45vw;
        height: 45vh;
        background-color: chartreuse;
        margin-top: 7px;
        margin-left: 33px;
        border: 1px solid rgb(124, 244, 100);
    }
    .box3{
        width:20vw ;
        height:37vh ;
        margin-top: 25px;
        margin-left: 20px;
        background-color:rgb(246, 10, 37);
        border: 2px solid rgb(240, 122, 122);
    }
    .box4{
        width:19vw ;
        height:37vh ;
        
        /* margin-left: 20px; */
        background-color:rgb(107, 199, 245);
       
       clear: right;
       margin-left:280px ;
       /* margin-right: 3opx; */
        border: 2px solid rgb(117, 206, 241);   
    }
    .box5{
        border: 4px solid black;
        border-radius: 15px;
        width:30vw ;
        height: 80px;
        margin-top: 30px;
        margin-left: 140px;
        border-radius: 10px auto;
        padding-left: 25px;
        color: blueviolet;
        background-color: rgb(244, 121, 125);
        padding-top: 40px;
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
       /* margin-bottom: 50px; */
       font-size: 25px;
    }
    .box6{
        border: 2px solid black;
        width: 590px;
        height: 40px;
        margin-top: 17px;
        /* color: red; */
        margin-left: 8px;
        /* margin-right:200px ; */
        padding-top: 20px;
       text-align: center;
       font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
       font-size: large;
       background-color: rgb(186, 186, 244);
    }
    .orange-box{
        border: 2px solid rgb(231, 166, 44);
        height: 32px;
        width: 32px;
        background-color: orange;
        margin-bottom: 700px;
        
        /* bottom:45px; */
        /* right: 23px; */
        float: right;
        border-radius: 60px;
    }

</style>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2">
            <div class="box3">
               <div class="box4"></div>
            </div>
        </div>
        <div class="box5"> Welcome to this sigma web devlopment express.</div>
        <div style="color:black ;" class="box6">Sumbitted to: <span style="color: red; font-size: larger;">Shivam roy</span></div>
        <div class="orange-box"></div>
    </div>
    
</body>
</html>
