<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flex-box</title>
</head>
<style>
    .container {
        border: 2px solid blue;
        display: flex;
        height: 60vh;
        /* justify-content:center; */
        align-items: center;
        /* ek line ko center ya phi start aur end karne ke liye aling -item ka paryog karte hai. */
        /* flex-direction: row-reverse; */
        /* flex-direction: column-reverse; */
        flex-wrap: wrap;
        align-content: flex-start;
        /* multiple line ya box ko center karne ke liye align-content ka paryog karte hai.  jab line wrap karti hai tabhi ham aling content ka paryog karte hai.*/
        flex-flow: row wrap;
        /* gap: 30px; */
        /* row-gap: 40px;
        column-gap: 50px; */
        gap: 40px 10px;


    }

    .item {
        height: 42px;
        width: 72px;
        border: 2px solid rgb(10, 9, 9);
        background-color: purple;
        margin: 5px;

    }

    .order-100 {
        order: 100;
        /* align-content: flex-start; */
    }

    .order-2 {
        order: 2;
    }

    .order-3 {
        order: 3;
    }

    .order-4 {
        order: 4;
    }

    .order-5 {
        order: 5;
    }

    .order-6 {
        order: 6;
    }

    .order-7 {
        order: 7;
    }

    .order-8 {
        order: 8;
    }

    .item1 {
        flex-grow: 7;
    }
</style>

<body>
    <main>
        <div class="container">
            <div class="item item1"></div>
            <div class="item order-2">2</div>
            <div class="item order-3">3</div>
            <div class="item order-4">4</div>
            <div class="item order-5">5</div>
            <div class="item order-6">6</div>
            <div class="item order-7">7</div>
            <div class="item order-8">8</div>
            <div class="item order-9">9</div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item order-1">66</div>

            <div class="item"></div>

            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>

            <div class="item"></div>
            <div class="item"></div>

            <div class="item order-1">90</div>
        </div>
    </main>
</body>

</html>
