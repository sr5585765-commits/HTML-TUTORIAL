<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS position property.</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .box {
        border: 2px solid black;
        width: 80vw;
        height: 125px;
        margin: 3px;
        margin-left: 40px;
        padding: 3px;

    }

    .box1 {
        background-color: aqua;
      /* position: absolute;  */
      position: sticky;
      top: -50px; 
      left: 150px; 
    }

    .box2 {
        background-color: rgb(237, 158, 171);
        /* position: relative;
        top: -45px;
        left: 45px; */ 

    }

    .box3 {
        background-color: peru;
        /* position: fixed;
        width: 600px;
        bottom: 7px; */

    }

    .box4 {
        background-color: rgb(244, 115, 207);
    }
    .parent {
        border: 4px solid purple;
        height: 250vh;
        margin-top: 60px;
        /* position: relative; */
        /* exception:transfrom and filter perspective can also make an element apear as positioned. */
        transform: translate(0);
        filter: invert(0);
        perspective: 0em;
    }
</style>

<body>
    <div class="parent">
        <div class=" box box1"></div>
        <div class=" box box2"></div>
        <div class=" box box3"></div>
        <div class=" box box4"></div>

    </div>

</body>

</html>
