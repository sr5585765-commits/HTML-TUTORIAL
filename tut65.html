  <script>
    // Question 1
    // Create a function using function keywords that takes a string as a arugument & return the number vowels in the string?

    function countVowels(str) {
      let count = 0;
      for (const char of str) {
        if (char === "a" || char === "e" || char === "i" || char === "o" || char === "u")
          count++;
      }
      console.log(count);
    }
    // Question 2 --> Same qustion do in arrow function ?
    const countVowel = (str)=>{
      let count = 0;
      for (const char of str) {
        if (char === "a" || char === "e" || char === "i" || char === "o" || char === "u")
          count++;
      }
     return count;
    }
