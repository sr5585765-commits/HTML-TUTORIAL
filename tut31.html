<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS media query</title>

</head>
<style>
    @media screen and (orientation: landscape) {
        body {
            border: 2px solid purple;
            
        }

    }

    body {
        background-color: black;
    }

    @media only screen and (max-width:455px) {
        body {
            background-color: blue;
        }

        .boxes {
            flex-direction: column;
        }
    }

    .box {
        width: 344px;
        height: 344px;
        background-color: rgb(237, 232, 232);
        padding: 3px;
        margin: 3px;
    }

    .boxes {
        display: flex;


    }
</style>

<body>
    <div>
        Hey I am a red body guy!
    </div>
    <div class="boxes">

        <div class="box" style="color:blue">Shivam roy</div>
        <div class="box" style="color:chartreuse">College student</div>
        <div class="box" style="color:darkmagenta">IPS group of college</div>

        <div class="box" style="color:darkorange">Traditional</div>
    </div>

</body>

</html>
