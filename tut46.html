<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    /* Reset some default styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Arial', sans-serif;
    background-color: #111;
    color: #fff;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
}

.logo {
    width: 120px;
    object-fit: contain;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: contain;
}

/* Banner */
.banner {
    position: relative;
    height: 448px;
    background-size: cover;
    background-position: center;
    color: white;
}

.banner_contents {
    position: absolute;
    top: 20%;
    left: 30px;
    z-index: 1;
    max-width: 500px;
}

.banner_buttons {
    margin-top: 20px;
}

.banner_button {
    padding: 10px 20px;
    margin-right: 10px;
    background-color: #e50914;
    border: none;
    cursor: pointer;
    font-size: 16px;
    border-radius: 5px;
    transition: background-color 0.3s;
}

.banner_button:hover {
    background-color: #f40612;
}

.banner_fadeBottom {
    position: absolute;
    top: 80%;
    left: 0;
    right: 0;
    height: 10%;
    background: linear-gradient(to top, rgba(0, 0, 0, 1), rgba(0, 0, 0, 0));
}

/* Movie Row */
.movie-row {
    margin-top: 70px;
    padding-left: 30px;
    padding-right: 30px;
}

.movie-row h2 {
    margin-bottom: 10px;
}

.movie-row_posters {
    display: flex;
    overflow-x: scroll;
    padding: 10px 0;
}

.movie-row_poster {
    width: 200px;
    height: 300px;
    object-fit: cover;
    margin-right: 10px;
    transition: transform 0.3s ease;
}

.movie-row_poster:hover {
    transform: scale(1.05);
}

/* Footer */
.footer {
    background-color: #141414;
    padding: 20px;
    text-align: center;
    margin-top: 20px;
}

.footer_contents {
    font-size: 12px;
    color: #fff;
}

</style>
<body>

    <!-- Header -->
    <header class="header">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix Logo">
        <img class="avatar" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="User Avatar">
    </header>

    <!-- Banner -->
    <section class="banner">
        <div class="banner_contents">
            <h1>Originals</h1>
            <div class="banner_buttons">
                <button class="banner_button">Play</button>
                <button class="banner_button">My List</button>
            </div>
            <h2>Watch the latest content on Netflix</h2>
        </div>
        <div class="banner_fadeBottom"></div>
    </section>

    <!-- Movie Row -->
    <section class="movie-row">
        <h2>Trending Now</h2>
        <div class="movie-row_posters">
            <!-- Add movie posters here -->
            <img class="movie-row_poster" src="https://image.tmdb.org/t/p/w500/8hZ4CkgKZ7ElVLMysVt6R4tHfQK.jpg" alt="Movie 1">
            <img class="movie-row_poster" src="https://image.tmdb.org/t/p/w500/8hZ4CkgKZ7ElVLMysVt6R4tHfQK.jpg" alt="Movie 2">
            <!-- Repeat images as necessary -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer_contents">
            <p>&copy; 2024 Netflix Clone. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js">

        // Select movie row elements
const movieRow = document.querySelector('.movie-row_posters');
let isMouseDown = false;
let startX;
let scrollLeft;

movieRow.addEventListener('mousedown', (e) => {
    isMouseDown = true;
    startX = e.pageX - movieRow.offsetLeft;
    scrollLeft = movieRow.scrollLeft;
});

movieRow.addEventListener('mouseleave', () => {
    isMouseDown = false;
});

movieRow.addEventListener('mouseup', () => {
    isMouseDown = false;
});

movieRow.addEventListener('mousemove', (e) => {
    if (!isMouseDown) return;
    const x = e.pageX - movieRow.offsetLeft;
    const walk = (x - startX) * 3; // Scroll speed multiplier
    movieRow.scrollLeft = scrollLeft - walk;
});
    </script>
   
</body>
</html>
