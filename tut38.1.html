<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS grid-3.</title>
</head>
<style>
    .container {
        border: 2px solid rgb(6, 6, 5);
         width: 90vw hg;
        height: 50vh; 
        display: grid;
        /* grid-template-columns: 1fr 2fr 1fr; */
        grid-template-columns:repeat(4,minmax(100px, 1fr)) ;
        row-gap: 10px;
        column-gap: 45px;
        justify-items: center;
        align-items: center;
    }

    .item {
        border: 3px solid red;
        height: 55px;
        width: 55px;
    }

    /* .item-1 {
        grid-area: nav;
    } */

    .item-2 {
        align-self: start;
        align-self: end;
        align-self: center;
    }

    /* .item-3 {
        grid-area: article;
    } */

    /* .item-4 {
        grid-area: footer;
    } */
    /* .item-5{
     grid-area: nav;   
    } */
</style>

<body>
    <div class="container">
        <div class="item item-1">1</div>
        <div class="item item-2">2</div>
        <div class="item item-3">3</div>
        <div class="item item-4">4</div>
        <div class="item item-5">5</div>
    </div>

</body>

</html>
