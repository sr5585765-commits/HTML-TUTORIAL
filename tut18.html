<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height,width,boders and background</title>
    <style>
        #firstpara {
            color: #92e241;
            background-color: rgb(111, 61, 235);
            height: 50px;
            width: 250px;
            border: 6px solid rgb(213, 213, 28);
            /* border-width: 4px; */
            /* border-color: green; */
            /* border-style: soild; */
            /* border-radius: 4px; */
           padding: auto;
           border-style:double;
            padding:20px 40px ;

        }

        #secondpara {
            color: blueviolet;
            background-color: cadetblue;
            height: 50px;
            width: 250px;
            border-top: 6px solid green;
            border-bottom: 6px solid red;
            border-right: 6px solid orange;
            border-left: 6px solid yellow;
            border-top-right-radius: 5px;
            border-top-left-radius: 7px;
            border-bottom-left-radius: 7px;
            border-bottom-right-radius: 9px
        
        }
        #Thirdpara{
            height: 400px;
            width: 500px;
           background-image:url("https://bestfriends.org/sites/default/files/styles/hero_mobile/public/hero-dash/Asana3808_Dashboard_Standard.jpg?h=ebad9ecf&itok=cWevo33k");
           border: 2px solid red;
           background-repeat: no-repeat;
           background-position: center center;
        }
    </style>
</head>

<body>
    <h2>This is css style</h2>
    <p id="firstpara">This is first paragraph tags!</p>
    <h2>This is css style</h2>
    <p id="secondpara">This is second paragraph tags</p>
    <h2>This is third heading</h2>
    <p id="Thirdpara">This is beautiful cat</p>

</body>

</html>
