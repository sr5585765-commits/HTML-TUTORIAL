    <script>
        //Push method.
        let foodItems = ["Apple", "Banana", "Cherry", "Litchi"]
        console.log(foodItems)
        foodItems.push("Chips");
        foodItems.push("Kurkure");

        //pop method.   
        let deleteditem = foodItems.pop();
        console.log(foodItems);
        console.log("Deleted = ", deleteditem);

        // toString method.
        let marks = [23, 45, 66, 77, 88, 989]
        console.log(marks)
        marks.toString();

        // Concat method.
        let marvelHeroes = ["Thor", "Batmen", "Ironmen"]
        let dcHeroes = ["Supermen", "Spidermen"]
        let indianHeroes = ["Shaktimen", "Krish"]
        let heroes = marvelHeroes.concat(dcHeroes, indianHeroes)
        console.log(heroes)

        //Unshift method. //add to start.
        let marvelHeroes1 = ["Thor", "Batmen", "Ironmen"]
        marvelHeroes1.unshift("Ironmen")
        console.log(marvelHeroes1)

        //shift method.
        let dcHeroes1 = ["Supermen", "Spidermen"]
        let val = dcHeroes1.shift();
        console.log("Deleted ", val)

        //Slice method.
        let hero = ["Thor", "Batmen", "Ironmen", "Supermen", "Spidermen", "Shaktimen", "Krish"]
        console.log(hero)
        console.log(hero.slice(1, 4));
