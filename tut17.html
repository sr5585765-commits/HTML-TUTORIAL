<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLORS IN CSS</title>
    <style>
        /* color by rbg value */
        #firstpara {
            color: #ff0000;
        }

        /* color by name  */

        #secondpara {
            color: blue;
        }

        /* color by hex value */
        #thirdpara {
            color:#118823;
            background-color: #740b3a;
        }
    </style>
</head>

<body>
    <h2>This is my first box</h2>
    <p id="firstpara">This is a paragraph from first box</p>
    <h2>This is my second box </h2>
    <p id="secondpara">This is a pragraph from second box</p>
    <h2>This is my third box</h2>
    <p id="thirdpara">This is a pragaph from third box</p>

</body>

</html>
